services:
  - type: web
    name: site-toi
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn backend.wsgi:application
    healthCheckPath: /healthz/
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: site-toi-db
          property: connectionString
      - key: GOOGLE_DRIVE_STORAGE
        value: "true"
      - key: GOOGLE_DRIVE_FOLDER_ID
        value: 13HHHHfLsKXHrOxUcxLSk7YVTA94b-EEs
      - key: GOOGLE_DRIVE_TOKEN_JSON
        sync: false
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: site-toi-db
    plan: free
    databaseName: site_toi
    user: site_toi
